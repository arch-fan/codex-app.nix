name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.1

      - name: Configure Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build codex-app package
        run: nix build .#codex-app

      - name: Optional smoke test (headless)
        continue-on-error: true
        run: |
          if command -v xvfb-run >/dev/null 2>&1; then
            set +e
            timeout 30s xvfb-run -a ./result/bin/codex-app
            rc=$?
            set -e
            if [ "$rc" -eq 0 ] || [ "$rc" -eq 124 ]; then
              echo "Smoke test succeeded (rc=$rc)."
            else
              echo "Smoke test failed (rc=$rc)."
              exit "$rc"
            fi
          else
            echo "xvfb-run not available on this runner, skipping optional smoke test."
          fi

