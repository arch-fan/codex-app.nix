name: Update Codex App

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-codex-app
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.1

      - name: Configure Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run updater
        run: nix run .#update

      - name: Create pull request
        if: ${{ !env.ACT }}
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          commit-message: "chore: update codex-app to latest upstream release"
          title: "chore: update codex-app to latest upstream release"
          body: |
            Automated update generated by `.github/workflows/update-codex-app.yml`.

            This PR runs `nix run .#update`, which reads the official appcast,
            updates `codexVersion` and source hash in `package.nix`, and keeps
            the package reproducible.
          branch: automation/update-codex-app
          delete-branch: true
          add-paths: |
            package.nix
